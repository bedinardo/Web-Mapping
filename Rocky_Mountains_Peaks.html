<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Rocky Mountain Peaks</title>
        <!-- Mapbox CSS -->
        <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />
        <!-- Mapbox JS -->
        <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>
        <style>
            /* Removes white spaces around the map */
            body { margin: 0; padding: 0; }
            /* Map style to fill the entire viewport */
            #map { position: absolute; top: 0; bottom: 0; width: 100%; }
            /* Title style */
            #title {
               position: absolute;
                width: 100%;
                z-index: 1;
                color: white;
                background: rgba(0, 0, 0, 0.5);
                padding: 5px; /* Adds padding around the title */
                margin: 0; 
                box-sizing: border-box; /* Ensures padding doesn't exceed width */
                text-align: center;
            }
        </style>
    </head>
    <body>
        <!-- Make a div for the map -->
         <div id='title'>
        <h1>Rocky Mountain Peaks</h1>
        </div>

        <div id='map'></div>
        <script>
            // Set the access token for Mapbox
            mapboxgl.accessToken = 'pk.eyJ1IjoiYmRpbmFyZG8iLCJhIjoiY21uZjdjNjg3MDdkOTJzb2p4NDB3YXgzNiJ9.blvzI6YN8c5MaPDZ4Striw';
            // Initialize the map with container as the map div just made
            var map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/bdinardo/cmoey8h7l00ip01seb1s97vwg', //My map style with choropleth layer
                center: [-105.7, 40.375], // Center of the Rocky Mountains NP
                zoom: 9.5 // Zoom level to show the park
            });
            // Map controls
            map.addControl(new mapboxgl.NavigationControl({
                showCompass: false
            }),
        'bottom-left');
        </script>
    </body>
</html>
