<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>US County Temperature Change</title>
        <!-- Mapbox CSS -->
        <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />
        <!-- Mapbox JS -->
        <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>
        <style>
            /* Removes white spaces around the map */
            body { margin: 0; padding: 0; }
            /* Map style to fill the entire viewport */
            #map { position: absolute; height: 100%; width: 100%; }
            /* Title style */
            #title 
                {  position: absolute;
                top: 10px;
                left: 10px;
                z-index: 1;
                color: white;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                margin: 0;
             }
            
        </style>
    </head>
    <body>
        <!-- Add a Title -->
         <div id='title'>
        <h1>US County Temperature Change</h1>
        </div>
        <!-- Make a div for the map -->
        <div id='map'></div>
        <script>
            // Set the access token for Mapbox
            mapboxgl.accessToken = 'pk.eyJ1IjoiYmRpbmFyZG8iLCJhIjoiY21uZjdjNjg3MDdkOTJzb2p4NDB3YXgzNiJ9.blvzI6YN8c5MaPDZ4Striw';
            // Initialize the map with container as the map div just made
            var map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/bdinardo/cmodi7ljr000c01sqdm0m5fgv', //My map style with choropleth layer
                center: [-98.5795, 39.8283], // Center of the US
                zoom: 3 // Zoom level to show the entire US
            });

            // Map controls
            map.addControl(new mapboxgl.NavigationControl());
        </script>
    </body>
</html>
