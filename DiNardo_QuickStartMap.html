<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
     <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>  
    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->
      <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <style>
        /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
        body { margin:0; padding:0; }
        #map { position:absolute; height: 100%; width:100%; }
         #banner { z-index: 9999; 
         background-color:rgb(135, 255, 165); 
         opacity: 85%; 
         text-align: center 
     }
 
    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
   <div id='map'></div>
    <!--  Insert the title div here (part VI) -->
      <div id = 'banner'>
        <h1>Vistit Crystal Springs Rhododendron Garden </h1>
        <h2>The Best Rhododendron Garden in Portland</h2>
      </div>
    <script>
        // Insert the JavaScript within the <script> tags, within the body   
        // Start with the Mapbox access token here (Part 2.1)
  mapboxgl.accessToken = 'pk.eyJ1IjoiYmRpbmFyZG8iLCJhIjoiY21uZjdjNjg3MDdkOTJzb2p4NDB3YXgzNiJ9.blvzI6YN8c5MaPDZ4Striw';
   
        // Then initialize the map here (Part 2.2)
        var map = new mapboxgl.Map({
            container: 'map', // id of a div on your page, where the map will be inserted
            style: 'mapbox://styles/bdinardo/cmnqe2tsx000e01re0fpn7x8f', // stylesheet location
            center: [-122.6788, 45.5212], // starting position [lng, lat]
            zoom: 11 // starting zoom
        });
        // Add the zoom contols here (part V)
        map.addControl(new mapboxgl.NavigationControl({
            showCompass: false,
        }), 'bottom-left');
        // Add popups for markers here. Yes, before the markers!  (part IV)
         var popup = new mapboxgl.Popup({ offset: 25 }).setText(
            'This is the Crystal Springs Rhododendron Garden, a beautiful garden in Portland, Oregon. It is a great place to visit if you are in the area and want to see some beautiful flowers.'
        );

        // Add any other variables such as markers here (part III)
        var marker = new mapboxgl.Marker({
            color: 'green'})
            .setLngLat([-122.63615289002514, 45.48200631570376])
            .setPopup(popup) // sets a popup on this marker
            .addTo(map);

       var popup_layer = new mapboxgl.Popup({ closeOnClick: true, anchor: 'bottom-right', offset: [-20, -5] })
        .setLngLat([-122.63615289002514, 45.48200631570376])
        .setHTML('<h1>Check Out the Link!</h1>')
        .addTo(map);
        
        
        var popup_layer_Crystal_springs = new mapboxgl.Popup({closeOnClick: false, anchor: 'top-left'})
    .setLngLat([-122.63615289002514, 45.48200631570376])
     .setHTML('<a href="https://csrgpdx.org/visit">Crystal Springs Rhododendron Garden</a>')
     .addTo(map);  
        // Add optional advanced "On load" function here
        
    </script>

  </body>

</html>
